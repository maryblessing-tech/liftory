<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Logged Out – Liftory</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0a0a0a;
      color: #f5f0eb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute; inset: 0;
      background: url('https://images.unsplash.com/photo-1526506118085-60ce8714f8c5?w=1400&auto=format&fit=crop') center/cover no-repeat;
      filter: brightness(0.12) saturate(1.2);
    }
    .card {
      position: relative;
      background: rgba(28,28,28,0.95);
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 3.5rem 3rem;
      text-align: center;
      max-width: 420px;
      width: 90%;
      animation: pop 0.5s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes pop { from{opacity:0;transform:scale(0.9)} to{opacity:1;transform:scale(1)} }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      color: #ff5c1a;
      letter-spacing: 3px;
      margin-bottom: 2rem;
    }
    .icon { font-size: 3.5rem; margin-bottom: 1rem; }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.5rem;
      letter-spacing: 1px;
      margin-bottom: 0.5rem;
    }
    p {
      color: rgba(245,240,235,0.55);
      font-size: 0.93rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .countdown {
      color: #ff5c1a;
      font-weight: 700;
    }
    .btns { display: flex; gap: 1rem; justify-content: center; }
    .btn {
      padding: 0.75rem 1.8rem;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }
    .btn-primary { background: #ff5c1a; border: none; color: white; }
    .btn-primary:hover { background: #c94412; }
    .btn-outline { border: 1.5px solid rgba(245,240,235,0.3); background: transparent; color: rgba(245,240,235,0.7); }
    .btn-outline:hover { border-color: #f5f0eb; color: #f5f0eb; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">LIFTORY</div>
    <div class="icon">👋</div>
    <h1>See You Soon!</h1>
    <p>You've been logged out successfully. Keep up the grind — your next PR is waiting.<br><br>
    Redirecting to home in <span class="countdown" id="countdown">5</span>s...</p>
    <div class="btns">
      <a href="login.html" class="btn btn-primary">Log Back In</a>
      <a href="index.html" class="btn btn-outline">Home</a>
    </div>
  </div>

  <script>
    // Clear tokens
    localStorage.removeItem('liftory_token');

    let n = 5;
    const el = document.getElementById('countdown');
    const t = setInterval(() => {
      n--;
      el.textContent = n;
      if (n <= 0) {
        clearInterval(t);
        window.location.href = 'index.html';
      }
    }, 1000);
  </script>
</body>
</html>
