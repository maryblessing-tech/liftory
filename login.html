<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log In – Liftory</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --black: #0a0a0a;
      --white: #f5f0eb;
      --orange: #ff5c1a;
      --orange-dim: #c94412;
      --gray: #1c1c1c;
      --input-bg: #141414;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--black);
      color: var(--white);
      min-height: 100vh;
      display: flex;
    }
    .split-left {
      flex: 1;
      position: relative;
      display: none;
    }
    @media(min-width:768px) { .split-left { display: block; } }
    .split-left::before {
      content: '';
      position: absolute; inset: 0;
      background: url('https://images.unsplash.com/photo-1581009146145-b5ef050c2e1e?w=1000&auto=format&fit=crop') center/cover no-repeat;
      filter: brightness(0.25) saturate(1.3);
    }
    .split-left-content {
      position: relative;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 3rem;
    }
    .split-left-content h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3.5rem;
      line-height: 1;
      letter-spacing: 2px;
      margin-bottom: 0.8rem;
    }
    .split-left-content h2 span { color: var(--orange); }
    .split-left-content p { color: rgba(245,240,235,0.6); font-size: 0.95rem; line-height: 1.6; }

    .split-right {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 3rem 2.5rem;
      background: var(--gray);
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      color: var(--orange);
      letter-spacing: 3px;
      margin-bottom: 2.5rem;
      display: block;
      text-decoration: none;
    }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.8rem;
      letter-spacing: 1px;
      margin-bottom: 0.3rem;
    }
    .sub { color: rgba(245,240,235,0.5); font-size: 0.9rem; margin-bottom: 2rem; }
    .form-group { margin-bottom: 1.3rem; }
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: rgba(245,240,235,0.6);
      margin-bottom: 0.4rem;
    }
    input {
      width: 100%;
      padding: 0.85rem 1rem;
      background: var(--input-bg);
      border: 1.5px solid #2a2a2a;
      border-radius: 6px;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      transition: border-color 0.2s;
      outline: none;
    }
    input:focus { border-color: var(--orange); }
    input::placeholder { color: rgba(245,240,235,0.25); }
    .forgot {
      display: block;
      text-align: right;
      font-size: 0.8rem;
      color: var(--orange);
      text-decoration: none;
      margin-top: 0.3rem;
    }
    .btn-submit {
      width: 100%;
      padding: 0.95rem;
      background: var(--orange);
      border: none;
      border-radius: 6px;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.5rem;
    }
    .btn-submit:hover { background: var(--orange-dim); }
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
      color: rgba(245,240,235,0.2);
      font-size: 0.8rem;
    }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:#2a2a2a; }
    .signup-link {
      text-align: center;
      font-size: 0.88rem;
      color: rgba(245,240,235,0.5);
    }
    .signup-link a { color: var(--orange); text-decoration: none; font-weight: 600; }
    .signup-link a:hover { text-decoration: underline; }
    .alert { display:none; background:#c0392b; color:#fff; padding:.7rem 1rem; border-radius:5px; margin-bottom:1rem; font-size:.88rem; }
    .success { display:none; background:#27ae60; color:#fff; padding:.7rem 1rem; border-radius:5px; margin-bottom:1rem; font-size:.88rem; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .split-right { animation: fadeUp 0.6s ease; }
  </style>
</head>
<body>

  <div class="split-left">
    <div class="split-left-content">
      <h2>WELCOME<br><span>BACK,</span><br>LIFTER</h2>
      <p>Your progress is waiting. Log in and continue where you left off — every rep counts.</p>
    </div>
  </div>

  <div class="split-right">
    <a href="index.html" class="logo">LIFTORY</a>
    <h1>Welcome Back</h1>
    <p class="sub">Log in to your account to continue.</p>

    <div class="alert" id="errorMsg"></div>
    <div class="success" id="successMsg"></div>

    <form id="loginForm">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Your username" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Your password" required/>
        <a href="#" class="forgot">Forgot password?</a>
      </div>

      <button type="submit" class="btn-submit">LOG IN</button>
    </form>

    <div class="divider">or</div>
    <p class="signup-link">Don't have an account? <a href="signup.html">Sign Up Free</a></p>
  </div>

  <script>
    // Check if already logged in
    if (localStorage.getItem('liftory_token')) {
      window.location.href = 'dashboard.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const err = document.getElementById('errorMsg');
      const suc = document.getElementById('successMsg');
      err.style.display = 'none';
      suc.style.display = 'none';

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        // wger API login - get auth token
        const res = await fetch('https://wger.de/api/v2/login/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const json = await res.json().catch(() => ({}));

        if (res.ok && json.token) {
          localStorage.setItem('liftory_token', json.token);
          localStorage.setItem('liftory_user', JSON.stringify({ username }));
          suc.textContent = 'Login successful! Redirecting...';
          suc.style.display = 'block';
          setTimeout(() => window.location.href = 'dashboard.html', 1200);
        } else {
          // Fallback: check local storage demo mode
          const storedUser = JSON.parse(localStorage.getItem('liftory_user') || '{}');
          if (storedUser.username === username) {
            localStorage.setItem('liftory_token', 'demo-token-' + Date.now());
            suc.textContent = 'Logged in (demo mode)! Redirecting...';
            suc.style.display = 'block';
            setTimeout(() => window.location.href = 'dashboard.html', 1200);
          } else {
            err.textContent = json.non_field_errors?.[0] || 'Invalid username or password.';
            err.style.display = 'block';
          }
        }
      } catch(ex) {
        // Offline demo fallback
        localStorage.setItem('liftory_token', 'demo-token-' + Date.now());
        localStorage.setItem('liftory_user', JSON.stringify({ username }));
        suc.textContent = 'Logged in (offline mode)! Redirecting...';
        suc.style.display = 'block';
        setTimeout(() => window.location.href = 'dashboard.html', 1200);
      }
    });
  </script>

</body>
</html>
